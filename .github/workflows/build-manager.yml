name: Build Manager

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: manager/src-tauri

      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: manager/node_modules
          key: ${{ runner.os }}-npm-${{ hashFiles('manager/package-lock.json') }}

      - name: Install dependencies
        working-directory: manager
        run: npm install

      - name: Generate icons
        working-directory: manager/icons
        run: node generate.cjs

      - name: Build Tauri app
        working-directory: manager
        run: npm run tauri:build

      - name: List build outputs
        shell: bash
        run: |
          echo "=== All exe files ==="
          find manager/src-tauri/target/release -name "*.exe" -type f || echo "No exe found"
          echo "=== MSI directory ==="
          ls -la manager/src-tauri/target/release/bundle/msi/ || echo "No MSI"
          echo "=== NSIS directory ==="
          ls -la manager/src-tauri/target/release/bundle/nsis/ || echo "No NSIS"

      - name: Prepare portable exe
        shell: bash
        run: |
          # Find the main exe (could be named differently)
          EXE_FILE=$(find manager/src-tauri/target/release -name "*.exe" -type f | grep -v bundle | head -1)
          if [ -n "$EXE_FILE" ]; then
            echo "Found exe: $EXE_FILE"
            cp "$EXE_FILE" manager/src-tauri/target/release/Claude-to-IM-Manager-Portable.exe
          else
            echo "No standalone exe found, will use NSIS installer as portable"
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Claude-to-IM-Manager-Windows
          path: |
            manager/src-tauri/target/release/bundle/msi/*.msi
            manager/src-tauri/target/release/bundle/nsis/*.exe
            manager/src-tauri/target/release/Claude-to-IM-Manager-Portable.exe
          if-no-files-found: warn

  release:
    needs: build-windows
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: Claude-to-IM-Manager-Windows
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/**
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}