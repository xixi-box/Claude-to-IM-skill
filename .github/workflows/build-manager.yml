name: Build Manager

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: manager/src-tauri

      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: manager/node_modules
          key: ${{ runner.os }}-npm-${{ hashFiles('manager/package-lock.json') }}

      - name: Install dependencies
        working-directory: manager
        run: npm install

      - name: Generate icons
        working-directory: manager/icons
        run: node generate.cjs

      - name: Build Tauri app
        working-directory: manager
        run: npm run tauri:build

      - name: Install 7zip
        run: choco install 7zip -y

      - name: Debug - List MSI contents
        shell: bash
        run: |
          MSI_FILE=$(ls manager/src-tauri/target/release/bundle/msi/*.msi | head -1)
          echo "=== MSI file: $MSI_FILE ==="
          7z l "$MSI_FILE"

      - name: Create portable version
        shell: bash
        run: |
          MSI_FILE=$(ls manager/src-tauri/target/release/bundle/msi/*.msi | head -1)

          # Extract MSI
          mkdir -p msi_extracted
          7z x "$MSI_FILE" -omsi_extracted -y

          echo "=== Extracted structure ==="
          find msi_extracted -type f | head -50

          # The main app is usually in a folder like "PFiles" or similar
          # Let's find the exe and its resources
          MAIN_EXE=$(find msi_extracted -name "*.exe" -type f | grep -i "claude" | grep -v "installer" | head -1)

          if [ -n "$MAIN_EXE" ]; then
            echo "Found main exe: $MAIN_EXE"
            EXE_DIR=$(dirname "$MAIN_EXE")

            # Create portable folder with all files from the exe's directory
            mkdir -p portable
            cp -r "$EXE_DIR"/* portable/ 2>/dev/null || true

            # Also look for resources folder (might be parallel to exe)
            PARENT_DIR=$(dirname "$EXE_DIR")
            if [ -d "$PARENT_DIR/resources" ]; then
              cp -r "$PARENT_DIR/resources" portable/ 2>/dev/null || true
            fi

            echo "=== Portable folder contents ==="
            ls -la portable/
            du -sh portable/

            # Create ZIP
            cd portable
            7z a -tzip "$GITHUB_WORKSPACE/Claude-to-IM-Manager-Portable.zip" .
            cd "$GITHUB_WORKSPACE"
          else
            echo "ERROR: Could not find main exe"
            exit 1
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Claude-to-IM-Manager-Windows
          path: |
            manager/src-tauri/target/release/bundle/msi/*.msi
            manager/src-tauri/target/release/bundle/nsis/*.exe
            Claude-to-IM-Manager-Portable.zip

  release:
    needs: build-windows
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: Claude-to-IM-Manager-Windows
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/**
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}