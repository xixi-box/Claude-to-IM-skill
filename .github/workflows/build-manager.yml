name: Build Manager

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: manager/src-tauri

      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: manager/node_modules
          key: ${{ runner.os }}-npm-${{ hashFiles('manager/package-lock.json') }}

      - name: Install dependencies
        working-directory: manager
        run: npm install

      - name: Generate icons
        working-directory: manager/icons
        run: node generate.cjs

      - name: Build Tauri app
        working-directory: manager
        run: npm run tauri:build

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Claude-to-IM-Manager-Windows
          path: |
            manager/src-tauri/target/release/bundle/msi/*.msi
            manager/src-tauri/target/release/bundle/nsis/*.exe
            manager/src-tauri/target/release/claude-to-im-manager.exe

  release:
    needs: build-windows
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: Claude-to-IM-Manager-Windows
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/**
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}