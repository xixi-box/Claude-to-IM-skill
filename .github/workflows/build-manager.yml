name: Build Manager

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: manager/src-tauri

      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: manager/node_modules
          key: ${{ runner.os }}-npm-${{ hashFiles('manager/package-lock.json') }}

      - name: Install dependencies
        working-directory: manager
        run: npm install

      - name: Generate icons
        working-directory: manager/icons
        run: node generate.cjs

      - name: Build Tauri app
        working-directory: manager
        run: npm run tauri:build

      - name: Create portable version
        shell: bash
        run: |
          # Find the MSI file
          MSI_FILE=$(ls manager/src-tauri/target/release/bundle/msi/*.msi | head -1)
          echo "MSI file: $MSI_FILE"

          # Install 7zip
          choco install 7zip -y

          # Extract MSI to portable folder
          mkdir -p portable
          7z x "$MSI_FILE" -oportable -y

          # Find the main app folder (usually contains .exe and resources)
          APP_FOLDER=$(find portable -name "Claude-to-IM Manager.exe" -type f | head -1)
          if [ -n "$APP_FOLDER" ]; then
            # Get the directory containing the exe
            APP_DIR=$(dirname "$APP_FOLDER")
            echo "App directory: $APP_DIR"

            # Create ZIP
            cd "$APP_DIR/.."
            7z a -tzip "$GITHUB_WORKSPACE/Claude-to-IM-Manager-Portable.zip" "$(basename "$APP_DIR")"
            cd "$GITHUB_WORKSPACE"
          else
            echo "Could not find main exe, creating zip from entire extraction"
            cd portable
            7z a -tzip "$GITHUB_WORKSPACE/Claude-to-IM-Manager-Portable.zip" .
            cd "$GITHUB_WORKSPACE"
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Claude-to-IM-Manager-Windows
          path: |
            manager/src-tauri/target/release/bundle/msi/*.msi
            manager/src-tauri/target/release/bundle/nsis/*.exe
            Claude-to-IM-Manager-Portable.zip

  release:
    needs: build-windows
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: Claude-to-IM-Manager-Windows
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/**
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}