name: Build Manager

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: manager/src-tauri

      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: manager/node_modules
          key: ${{ runner.os }}-npm-${{ hashFiles('manager/package-lock.json') }}

      - name: Install dependencies
        working-directory: manager
        run: npm install

      - name: Generate icons
        working-directory: manager/icons
        run: node generate.cjs

      - name: Build Tauri app
        working-directory: manager
        run: npm run tauri:build

      - name: Install 7zip
        run: choco install 7zip -y

      - name: Create portable version from NSIS
        shell: bash
        run: |
          NSIS_FILE=$(ls manager/src-tauri/target/release/bundle/nsis/*.exe | head -1)
          echo "=== NSIS file: $NSIS_FILE ==="

          # Extract NSIS installer
          mkdir -p portable
          7z x "$NSIS_FILE" -oportable -y

          echo "=== Extracted contents ==="
          ls -la portable/
          du -sh portable/

          # Remove uninstaller
          rm -f portable/uninstall.exe 2>/dev/null || true
          rm -f portable/\$PLUGINSDIR 2>/dev/null || true

          # Create ZIP
          cd portable
          7z a -tzip "$GITHUB_WORKSPACE/Claude-to-IM-Manager-Portable.zip" .
          cd "$GITHUB_WORKSPACE"

          echo "=== Final portable ZIP size ==="
          ls -lh Claude-to-IM-Manager-Portable.zip

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Claude-to-IM-Manager-Windows
          path: |
            manager/src-tauri/target/release/bundle/msi/*.msi
            manager/src-tauri/target/release/bundle/nsis/*.exe
            Claude-to-IM-Manager-Portable.zip

  release:
    needs: build-windows
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: Claude-to-IM-Manager-Windows
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/**
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}